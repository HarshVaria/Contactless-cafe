version: '3.8'

services:
  # MongoDB Local Database (will be replaced by MongoDB Atlas in cloud)
  mongodb:
    image: mongo:7.0
    container_name: cafe-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: contactless-cafe
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - cafe-network

  # MongoDB Express - Web UI to view database
  mongo-express:
    image: mongo-express:latest
    container_name: cafe-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - cafe-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  cafe-network:
    driver: bridge